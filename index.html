<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chev Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0c0e15;
    color: #d1d4dc;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- Top bar ---------- */
  #topbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    background: #131722;
    border-bottom: 1px solid #1e222d;
    flex-wrap: wrap;
  }
  #topbar .label {
    font-size: 11px;
    color: #787b86;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 6px;
    margin-left: 10px;
    font-family: "Share Tech Mono", monospace;
    font-weight: normal;
  }
  #topbar .label:first-child { margin-left: 0; }

  .pill {
    background: #1c2030;
    border: 1px solid #2a2e39;
    color: #9598a1;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    font-family: "Share Tech Mono", monospace;
  }
  .pill:hover { background: #262b3a; color: #d1d4dc; }
  .pill.active { background: #2962ff; color: #ffffff; border-color: #2962ff; }
  .pill.chevTools.active { background: #d4af37; color: #131722; border-color: #d4af37; }

  .iconBtn {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; padding: 0; flex-shrink: 0;
  }
  .iconBtn svg { width: 16px; height: 16px; }
  #rightToggle { margin-left: auto; }

  /* ---------- Body layout ---------- */
  #body { flex: 1; display: flex; min-height: 0; position: relative; }

  /* ===== LEFT SIDEBAR ===== */
  #leftPanel {
    position: absolute; top: 0; left: 0; height: 100%; z-index: 50;
    width: 0; overflow: hidden; background: #131722; border-right: 1px solid #1e222d;
    transition: width 0.18s ease; display: flex; flex-direction: column;
  }
  #leftPanel.open { width: 280px; }
  #leftInner { width: 280px; overflow-y: auto; flex: 1; }

  .sectionHeader {
    padding: 10px 14px 6px; font-size: 11px; color: #787b86; text-transform: uppercase;
    letter-spacing: 0.06em; border-top: 1px solid #1e222d;
  }
  .sectionHeader:first-child { border-top: none; }

  #groupTabs { display: flex; border-bottom: 1px solid #1e222d; }
  .groupTab {
    flex: 1; text-align: center; padding: 9px 0; font-size: 11px; color: #787b86;
    cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .groupTab:hover { color: #d1d4dc; }
  .groupTab.active { color: #2962ff; border-bottom-color: #2962ff; }

  .watchRow {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 14px; cursor: pointer; border-left: 2px solid transparent;
    font-size: 11px;
  }
  .watchRow:hover { background: #1c2030; }
  .watchRow:hover .removeBtn { opacity: 1; }
  .watchRow.active { background: #1c2030; border-left-color: #2962ff; }
  .watchRow .left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .watchRow .logo { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; background: #1c2030; }
  .watchRow .flagEmoji { font-size: 16px; line-height: 1; }
  img.emoji { height: 1em; width: 1em; vertical-align: -0.15em; margin: 0 0.05em; }
  .watchRow img.emoji { height: 18px; width: 18px; vertical-align: middle; margin: 0; flex-shrink: 0; }
  .logMood img.emoji, .logPnl img.emoji { height: 1.15em; width: 1.15em; vertical-align: -0.2em; }
  .watchRow .tradeDot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: transparent; }
  .watchRow .tradeDot.live { background: #089981; box-shadow: 0 0 4px #089981; }
  .watchRow .tradeDot.loss { background: #f23645; box-shadow: 0 0 4px #f23645; }
  .watchRow .sym { font-size: 13px; color: #d1d4dc; font-weight: 600; white-space: nowrap; }
  .watchRow .right { display: flex; align-items: center; gap: 8px; }
  .watchRow .priceBlock { text-align: right; }
  .watchRow .px { font-size: 12px; color: #d1d4dc; font-family: "Share Tech Mono", monospace; }
  .watchRow .chg { font-size: 11px; font-family: "Share Tech Mono", monospace; }
  .watchRow .chg.up { color: #089981; }
  .watchRow .chg.down { color: #f23645; }
  .removeBtn { opacity: 0; background: none; border: none; color: #787b86; font-size: 14px; cursor: pointer; padding: 2px 4px; line-height: 1; }
  .removeBtn:hover { color: #f23645; }

  #addRow { padding: 10px 14px; border-top: 1px solid #1e222d; }
  #addRow button { width: 100%; background: #1c2030; border: 1px dashed #2a2e39; color: #787b86; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  #addRow button:hover { color: #d1d4dc; border-color: #2962ff; }

  /* ===== Trading Logs - departure board style ===== */
  #tradingLogs { padding: 8px 10px; }
  .logRow {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 14px; font-size: 11px;
    border-bottom: 1px solid #161a26;
  }
  .logRow:hover { background: #161a26; cursor: pointer; }
  .logRow .logMood { font-size: 13px; }
  .logRow .logPair { font-weight: 600; color: #d1d4dc; flex: 1; white-space: nowrap; }
  .logRow .logLev { color: #5d6068; font-family: "Share Tech Mono", monospace; }
  .logRow .logType { font-size: 10px; color: #787b86; text-transform: uppercase; font-family: "Share Tech Mono", monospace; }
  .logRow .logPnl {
    font-family: "Share Tech Mono", monospace; font-weight: 700; min-width: 64px; text-align: right;
  }
  .logRow .logPnl.pnl-up { color: #089981; }
  .logRow .logPnl.pnl-down { color: #f23645; }
  .logRow.lastClosedRow { background: rgba(255,255,255,0.02); }
  .logRow.pulse { animation: pulseFlash 0.6s ease; }
  @keyframes pulseFlash { 0% { background: rgba(212,175,55,0.3); } 100% { background: transparent; } }

  .emptyNote { color: #5d6068; font-size: 12px; padding: 10px 14px; }

  /* ===== Chev's Corner ===== */
  #chevsCorner { padding: 10px; }
  
  .ideaCard {
    background: #131620; border: 1px solid #232838; border-radius: 6px;
    margin-bottom: 8px; padding: 10px 12px; cursor: pointer; transition: border-color 0.12s, background 0.12s;
  }
  .ideaCard:hover { border-color: #2962ff; background: #161a26; }
  .ideaCard.activeIdea { border-color: #d4af37; }
  .ideaCard .ideaHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .ideaCard .ideaPair { font-size: 13px; font-weight: 700; color: #d1d4dc; }
  .ideaCard .ideaType { font-size: 10px; color: #787b86; text-transform: uppercase; }
  .ideaCard .ideaTags { font-size: 10px; color: #d4af37; margin-bottom: 6px; }
  .ideaCard .ideaMeta { display: flex; justify-content: space-between; font-size: 10px; color: #787b86; font-family: "SF Mono", Consolas, monospace; }
  .ideaCard .ideaMeta .e { color: #9598a1; }
  .ideaCard .ideaMeta .s { color: #f23645; }
  .ideaCard .ideaMeta .t { color: #089981; }

  /* ---------- Chart area ---------- */
  #chartWrap { position: relative; flex: 1; min-height: 0; overflow: hidden; }
  #chart { width: 100%; height: 100%; }
  /* ---------- Drawing toolbar ---------- */
  .drawSep { width: 1px; height: 20px; background: #2a2e39; margin: 0 4px; flex-shrink: 0; }
  .pill.drawTool.active { background: #f0b429; color: #131722; border-color: #f0b429; }
  .pill.drawClear { color: #f23645; border-color: #2a2e39; }
  .pill.drawClear:hover { background: rgba(242,54,69,0.15); color: #f23645; border-color: #f23645; }
  #magnetToggle.active { background: #f0b429; color: #131722; border-color: #f0b429; }
  #magnetToggle { font-size: 14px; padding: 2px 8px; }

  /* ---------- Drawing canvas ---------- */
  #drawingCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 3;
  }

  /* ---------- Object tree panel ---------- */
  #objectTree {
    display: none; position: absolute; bottom: 34px; right: 10px; z-index: 10;
    width: 230px; max-height: 280px; overflow-y: auto;
    background: #131722; border: 1px solid #2a2e39; border-radius: 6px;
    font-family: "Share Tech Mono", monospace;
  }
  #objectTree.open { display: block; }
  #objectTree .objHeader {
    display:flex; align-items:center; padding: 7px 10px;
    font-size:10px; color:#787b86; text-transform:uppercase; letter-spacing:0.06em;
    border-bottom:1px solid #1e222d; font-weight:normal;
  }
  #objectTree .objClose { margin-left:auto; cursor:pointer; color:#5d6068; font-size:13px; }
  #objectTree .objClose:hover { color:#f23645; }
  .objRow { display:flex; align-items:center; gap:6px; padding:5px 8px; font-size:11px; color:#9598a1; border-bottom:1px solid #1e222d; cursor:pointer; }
  .objRow:hover { background:#1c2030; }
  .objColor { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .objLabel { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .objEye, .objDel { background:none; border:none; color:#5d6068; cursor:pointer; padding:2px 4px; font-size:11px; line-height:1; }
  .objEye:hover { color:#d1d4dc; }
  .objDel:hover { color:#f23645; }

  /* ---------- Drawing context menu ---------- */
  #drawCtx {
    display:none; position:fixed; z-index:200;
    background:#1c2030; border:1px solid #2a2e39; border-radius:6px;
    padding:12px 14px; min-width:210px;
    font-family:"Share Tech Mono",monospace; box-shadow:0 8px 24px rgba(0,0,0,0.5);
  }
  .ctxTitle { font-size:10px; color:#787b86; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px; }
  .ctxRow { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:10px; color:#787b86; }
  .ctxRow label { min-width:36px; color:#787b86; }
  #ctxColors { display:flex; gap:4px; flex-wrap:wrap; }
  .swatch { width:16px; height:16px; border-radius:3px; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
  .swatch.active, .swatch:hover { border-color:#fff; }
  #ctxText { flex:1; background:#0c0e15; border:1px solid #2a2e39; color:#d1d4dc; padding:3px 6px; border-radius:3px; font-size:10px; font-family:inherit; outline:none; }
  #ctxAligns { display:flex; gap:3px; }
  #ctxAligns button { background:#1e222d; border:1px solid #2a2e39; color:#787b86; padding:2px 7px; border-radius:3px; cursor:pointer; font-size:10px; font-family:inherit; }
  #ctxAligns button.active, #ctxAligns button:hover { background:#2962ff; color:#fff; border-color:#2962ff; }
  #ctxDelete { width:100%; margin-top:8px; background:rgba(242,54,69,0.12); border:1px solid rgba(242,54,69,0.35); color:#f23645; padding:5px; border-radius:3px; cursor:pointer; font-size:10px; font-family:inherit; }
  #ctxDelete:hover { background:rgba(242,54,69,0.25); }
  input[type=range] { accent-color:#2962ff; cursor:pointer; flex:1; }
  .ctxNum { min-width:28px; font-size:10px; color:#9598a1; text-align:right; }

  #chevWatermark {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 200px;
    opacity: 0.18;
    pointer-events: none;
    filter: grayscale(40%);
    z-index: 2;
  }

  #tradeOverlayBar {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 15;
    display: flex;
    gap: 6px;
  }
  .ovBtn {
    background: #1c2030;
    border: 1px solid #2a2e39;
    color: #787b86;
    font-size: 10px;
    font-family: "Share Tech Mono", monospace;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: color 0.15s, border-color 0.15s;
  }
  .ovBtn.active {
    color: #d4af37;
    border-color: #d4af37;
  }
  .ovAnalysisToggle { border-radius: 4px 0 0 4px; }
  .ovAnalysisArrow  { border-radius: 0 4px 4px 0; border-left: none; padding: 5px 7px; margin-left: -1px; }
  #overlayAnalysisPanel {
    position: absolute;
    top: 42px;
    right: 10px;
    z-index: 16;
    background: #1c2030;
    border: 1px solid #2a2e39;
    border-radius: 4px;
    padding: 8px 12px;
    display: none;
    flex-direction: column;
    gap: 7px;
    min-width: 130px;
  }
  .ovCheck {
    display: flex;
    align-items: center;
    gap: 7px;
    color: #787b86;
    font-size: 10px;
    font-family: "Share Tech Mono", monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .ovCheck input[type="checkbox"] {
    accent-color: #d4af37;
    cursor: pointer;
    width: 11px; height: 11px;
  }

  #priceInfo {
    position: absolute; top: 12px; left: 16px; z-index: 5;
    font-size: 13px; color: #9598a1; pointer-events: none; line-height: 1.5; transition: left 0.18s ease;
  }
  #priceInfo .sym { font-size: 16px; color: #d1d4dc; font-weight: 600; margin-right: 8px; }
  #priceInfo .price { font-size: 16px; font-weight: 600; }
  #priceInfo .up { color: #089981; }
  #priceInfo .down { color: #f23645; }

  #ohlcInfo { margin-top: 4px; font-family: "SF Mono", Consolas, monospace; font-size: 11px; color: #787b86; white-space: nowrap; }
  #ohlcInfo .val { color: #d1d4dc; }
  #ohlcInfo .val.up { color: #089981; }
  #ohlcInfo .val.down { color: #f23645; }
  #ohlcInfo span { margin-right: 10px; }
  #candleCountdown { margin-top: 3px; font-family: "SF Mono", Consolas, monospace; font-size: 11px; color: #4c525e; }

  #chevActiveIdeaBanner {
    position: absolute; top: 12px; right: 16px; z-index: 5;
    background: rgba(212,175,55,0.12); border: 1px solid #d4af37; border-radius: 4px;
    padding: 6px 10px; font-size: 11px; color: #d4af37; display: none; max-width: 260px;
  }

  #status { position: absolute; bottom: 10px; left: 16px; z-index: 5; font-size: 11px; color: #5d6068; pointer-events: none; transition: left 0.18s ease; }

  /* ===== RIGHT PANEL - Chev chat ===== */
  #rightPanel {
    width: 0; overflow: hidden; background: #131722; border-left: 1px solid #1e222d;
    transition: width 0.18s ease; flex-shrink: 0; display: flex;
  }
  #rightPanel.open { width: 320px; }

  #chatList { width: 90px; border-right: 1px solid #1e222d; overflow-y: auto; flex-shrink: 0; }
  .chatListItem { padding: 10px 8px; font-size: 11px; color: #9598a1; cursor: pointer; border-left: 2px solid transparent; word-break: break-word; }
  .chatListItem:hover { background: #1c2030; }
  .chatListItem.active { background: #1c2030; border-left-color: #2962ff; color: #d1d4dc; }
  #newChatBtn { padding: 8px; text-align: center; font-size: 18px; color: #787b86; cursor: pointer; border-bottom: 1px solid #1e222d; }
  #newChatBtn:hover { color: #2962ff; }

  #chatMain { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #chatMessages { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; }
  .msg { margin-bottom: 10px; line-height: 1.4; }
  .msg.user { color: #d1d4dc; text-align: right; }
  .msg.assistant { color: #9598a1; }
  .msg .who { font-size: 10px; color: #5d6068; margin-bottom: 2px; text-transform: uppercase; }
  #chatInputRow { display: flex; border-top: 1px solid #1e222d; padding: 8px; gap: 6px; }
  #chatInput { flex: 1; background: #0c0e15; border: 1px solid #2a2e39; color: #d1d4dc; border-radius: 4px; padding: 8px; font-size: 12px; resize: none; font-family: inherit; }
  #chatSendBtn { background: #2962ff; border: none; color: white; border-radius: 4px; padding: 0 14px; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>

  <div id="topbar">
    <button class="pill iconBtn" id="leftToggle" title="Sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <span class="label">Timeframe</span>
    <button class="pill" data-tf="15m">15m</button>
    <button class="pill" data-tf="30m">30m</button>
    <button class="pill active" data-tf="1h">1h</button>
    <button class="pill" data-tf="4h">4h</button>
    <button class="pill" data-tf="1d">1d</button>

    <button class="pill chevTools" id="chevToolsToggle" title="Show/hide Chev's lines on this chart">Chev Tools</button>

    <div class="drawSep"></div>
    <span class="label">Draw</span>
    <button class="pill drawTool iconBtn" data-tool="hline" title="Horizontal Line">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="7" x2="19" y2="7"/></svg>
    </button>
    <button class="pill drawTool iconBtn" data-tool="ray" title="Ray">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="12" x2="17" y2="3"/><polygon points="17,3 13.5,4.5 16,7.5" fill="currentColor" stroke="none"/></svg>
    </button>
    <button class="pill drawTool iconBtn" data-tool="trendline" title="Trendline">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="4" cy="11" r="1.8" fill="currentColor"/><line x1="4" y1="11" x2="16" y2="3"/><circle cx="16" cy="3" r="1.8" fill="currentColor"/></svg>
    </button>
    <button class="pill drawTool iconBtn" data-tool="rect" title="Rectangle">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="16" height="10" rx="1"/></svg>
    </button>
    <button class="pill drawTool iconBtn" data-tool="fib" title="Fibonacci">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.2">
        <line x1="1" y1="1.5" x2="19" y2="1.5"/>
        <line x1="1" y1="5" x2="19" y2="5" stroke="#5d6068" stroke-dasharray="3,2"/>
        <rect x="1" y="7" width="18" height="2.5" fill="#d4af37" stroke="none" opacity="0.6"/>
        <line x1="1" y1="11" x2="19" y2="11" stroke="#5d6068" stroke-dasharray="3,2"/>
        <line x1="1" y1="13.5" x2="19" y2="13.5"/>
      </svg>
    </button>
    <button class="pill drawTool iconBtn" data-tool="channel" title="Parallel Channel">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="10" x2="18" y2="4"/><line x1="2" y1="14" x2="18" y2="8" stroke-dasharray="3,2"/></svg>
    </button>
    <button class="pill drawTool iconBtn" data-tool="vp" title="Volume Profile">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="10" y="1" width="8" height="2.5" fill="currentColor" opacity="0.9" rx="0.5"/>
        <rect x="7"  y="4.5" width="11" height="2.5" fill="currentColor" opacity="0.7" rx="0.5"/>
        <rect x="12" y="8" width="6" height="2.5" fill="currentColor" opacity="0.5" rx="0.5"/>
        <rect x="14" y="11.5" width="4" height="2" fill="currentColor" opacity="0.35" rx="0.5"/>
        <line x1="2" y1="1" x2="2" y2="13" stroke-width="1.5"/>
      </svg>
    </button>
    <button class="pill drawTool iconBtn" data-tool="measure" title="Measure">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="16" height="8" rx="1" stroke-dasharray="3,2"/>
        <line x1="2" y1="7" x2="5" y2="7"/>
        <line x1="15" y1="7" x2="18" y2="7"/>
        <line x1="2" y1="3" x2="2" y2="11"/>
        <line x1="18" y1="3" x2="18" y2="11"/>
      </svg>
    </button>
    <button class="pill drawTool iconBtn" data-tool="pencil" title="Pencil / Marker  (freehand)">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M4 11 L14 2 L17 5 L7 13 Z" stroke-linejoin="round"/>
        <path d="M4 11 L2.5 13 L5.5 13 Z" fill="currentColor" opacity="0.65" stroke="none"/>
        <line x1="4" y1="11" x2="7" y2="13" stroke-width="1"/>
      </svg>
    </button>
    <button class="pill" id="magnetToggle" title="Magnet">🧲</button>
    <button class="pill iconBtn" id="objectTreeToggle" title="Objects">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.6">
        <line x1="6" y1="2.5" x2="19" y2="2.5"/><circle cx="3" cy="2.5" r="1.3" fill="currentColor"/>
        <line x1="6" y1="7" x2="19" y2="7"/><circle cx="3" cy="7" r="1.3" fill="currentColor"/>

<script>
  /* ============================================================
     CONFIG
     ============================================================ */
  function getStoredKey(storageKey, promptText) {
    let val = localStorage.getItem(storageKey);
    if (!val) {
      val = prompt(promptText);
      if (val) localStorage.setItem(storageKey, val.trim());
    }
    return val;
  }
  if (!localStorage.getItem('chevFinnhubKey')) {
    localStorage.setItem('chevFinnhubKey', 'd8u6i89r01qinhug59b0d8u6i89r01qinhug59bg');
  }
  function getFinnhubKey() { return localStorage.getItem('chevFinnhubKey'); }
  if (!localStorage.getItem('chevOandaKey')) {
    localStorage.setItem('chevOandaKey', 'aff64f8cfa51d031b0537292a1a0e682-62e4e27a6ddb604f85684c4d9ccdafc6');
  }
  function getOandaKey() { return localStorage.getItem('chevOandaKey'); }
  const OANDA_BASE = 'https://api-fxtrade.oanda.com/v3';
  const OANDA_GRAN = { '15m': 'M15', '30m': 'M30', '1h': 'H1', '4h': 'H4', '1d': 'D' };

  // ── Remote access ──────────────────────────────────────────────────────────
  const FIREBASE_BASE = 'https://chev-monitor-default-rtdb.firebaseio.com';
  // API_BASE: empty = relative paths (works when served by Dexter locally).
  // On GitHub Pages this gets overwritten with the ngrok URL from Firebase config.
  let API_BASE = '';
  async function _resolveApiBase() {
    const isLocal = ['localhost', '127.0.0.1'].includes(location.hostname);
    if (isLocal) return; // relative paths work fine
    try {
      const r = await fetch(`${FIREBASE_BASE}/config/api_url.json`);
      if (r.ok) { const url = await r.json(); if (url) { API_BASE = url; return; } }
    } catch(e) {}
    console.warn('[Chev] No backend URL in Firebase. Run `ngrok http 8080` alongside Dexter.');
  }
  // Wrapper: adds ngrok bypass header when going through a tunnel
  function _apiFetch(path, opts = {}) {
    if (API_BASE) opts.headers = { 'ngrok-skip-browser-warning': 'true', ...(opts.headers || {}) };
    return fetch(API_BASE + path, opts);
  }
  function getOpenWebUIKey() { return getStoredKey('chevOpenWebUIKey', 'Paste your Open WebUI API key (used to talk to Chev):'); }
  function getOpenWebUIUrl() { return localStorage.getItem('chevOpenWebUIUrl') || 'http://localhost:3000/api/chat/completions'; }
  function getChevModelId() { return getStoredKey('chevModelId', "What is Chev's model id in Open WebUI? (e.g. chev-chelios)") || 'chev-chelios'; }

  /* ============================================================
     STATE
     ============================================================ */
  const chartWrap = document.getElementById('chartWrap');
  const statusEl = document.getElementById('status');
  const symLabel = document.getElementById('symLabel');
  const priceLabel = document.getElementById('priceLabel');
  const priceInfo = document.getElementById('priceInfo');
  const ohlcInfo = document.getElementById('ohlcInfo');
  const chevBanner = document.getElementById('chevActiveIdeaBanner');

  const STOCK_DOMAINS = { NVDA: 'nvidia.com', TSLA: 'tesla.com', AMZN: 'amazon.com', AMD: 'amd.com' };
  const FOREX_FLAGS = {
    'EUR/USD': '🇪🇺', 'GBP/USD': '🇬🇧', 'USD/JPY': '🇯🇵', 'AUD/USD': '🇦🇺',
    'USD/CAD': '🇨🇦', 'USD/CHF': '🇨🇭', 'NZD/USD': '🇳🇿',
  };
  const TAG_NAMES = { SR: 'Support/Resistance', FB: 'Fibonacci', GP: 'Golden Pocket', RS: 'RSI Divergence', VW: 'VWAP', EM: 'EMA', VP: 'Volume Profile', CP: 'Candle Pattern', TR: 'Triangle' };

  const DEFAULT_GROUPS = {
    crypto: [
      { symbol: 'BTCUSDT', label: 'BTC', icon: 'btc', type: 'crypto' },
      { symbol: 'ETHUSDT', label: 'ETH', icon: 'eth', type: 'crypto' },
      { symbol: 'SOLUSDT', label: 'SOL', icon: 'sol', type: 'crypto' },
      { symbol: 'XRPUSDT', label: 'XRP', icon: 'xrp', type: 'crypto' },
      { symbol: 'ADAUSDT', label: 'ADA', icon: 'ada', type: 'crypto' },
      { symbol: 'XLMUSDT', label: 'XLM', icon: 'xlm', type: 'crypto' },
    ],
    forex: [
      { symbol: 'EUR/USD', label: 'EUR/USD', type: 'forex' },
      { symbol: 'GBP/USD', label: 'GBP/USD', type: 'forex' },
      { symbol: 'USD/JPY', label: 'USD/JPY', type: 'forex' },
      { symbol: 'AUD/USD', label: 'AUD/USD', type: 'forex' },
    ],
    stocks: [
      { symbol: 'NVDA', label: 'NVDA', type: 'stock' },
      { symbol: 'TSLA', label: 'TSLA', type: 'stock' },
      { symbol: 'AMZN', label: 'AMZN', type: 'stock' },
      { symbol: 'AMD', label: 'AMD', type: 'stock' },
    ],
  };

  const GROUPS_FB_URL = `${FIREBASE_BASE}/watchlist/groups.json`;
  function loadGroups() {
    const saved = localStorage.getItem('chevWatchlistGroups');
    if (saved) { try { return JSON.parse(saved); } catch(e) {} }
    return JSON.parse(JSON.stringify(DEFAULT_GROUPS));
  }
  function saveGroups() {
    const payload = JSON.stringify(groups);
    localStorage.setItem('chevWatchlistGroups', payload);
    fetch(GROUPS_FB_URL, { method:'PUT', body:payload, headers:{'Content-Type':'application/json'} }).catch(()=>{});
  }
  // On load: pull watchlist from Firebase (friend's additions show up automatically)
  fetch(GROUPS_FB_URL).then(r => r.ok ? r.json() : null).then(d => {
    if (d && typeof d === 'object') {
      groups = d;
      localStorage.setItem('chevWatchlistGroups', JSON.stringify(d));
      buildWatchlistRows();
      refreshWatchlistPrices();
    }
  }).catch(()=>{});

  let groups = loadGroups();
  let currentGroup = 'crypto';
  let currentSymbol = groups.crypto[2].symbol; // SOL default
  let currentType = 'crypto';
  let currentTf = '1h';
  let pollTimer = null;
  let chevToolsOn = true;
  let chevPriceLines = [];
  let activeIdeaRow = null;

  /* ============================================================
     MAIN CHART
     ============================================================ */
  const chart = LightweightCharts.createChart(document.getElementById('chart'), {
    autoSize: true,
    layout: { background: { color: '#131722' }, textColor: '#787b86' },
    grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
    rightPriceScale: { borderColor: '#2a2e39', scaleMargins: { top: 0.08, bottom: 0.25 } },
    timeScale: { borderColor: '#2a2e39', timeVisible: true, secondsVisible: false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  });
  const candleSeries = chart.addCandlestickSeries({
    upColor: '#089981', downColor: '#f23645', borderVisible: false, wickUpColor: '#089981', wickDownColor: '#f23645',
  });
  const volumeSeries = chart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'volume' });
  chart.priceScale('volume').applyOptions({ scaleMargins: { top: 0.82, bottom: 0 }, visible: false });

  new ResizeObserver(() => syncCanvasSize()).observe(chartWrap);

  function volColor(c) { return c.close >= c.open ? 'rgba(8,153,129,0.5)' : 'rgba(242,54,69,0.5)'; }
  function formatVolume(v) {
    if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
    if (v >= 1e6) return (v / 1e6).toFixed(2) + 'M';
    if (v >= 1e3) return (v / 1e3).toFixed(2) + 'K';
    return v.toFixed(2);
  }

  /* ---------- Data fetching: crypto (Binance) vs forex/stock (Finnhub) ---------- */
  const FINNHUB_RES_MAP = { '15m': '15', '30m': '30', '1h': '60', '4h': '240', '1d': 'D' };

  function toFinnhubSymbol(symbol, type) {
    if (type === 'forex') return 'OANDA:' + symbol.replace('/', '_');
    return symbol;
  }

  async function fetchCandles(symbol, interval, type, limit = 1500) {
    if (type === 'crypto') {
      const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Binance error ${res.status}`);
      const raw = await res.json();
      return raw.map(c => ({
        time: Math.floor(c[0] / 1000), open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]), volume: parseFloat(c[5]),
      }));
    } else if (type === 'forex') {
      const gran = OANDA_GRAN[interval] || 'H1';
      const instrument = symbol.replace('/', '_');
      const url = `${OANDA_BASE}/instruments/${instrument}/candles?granularity=${gran}&count=${Math.min(limit, 5000)}&price=M`;
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${getOandaKey()}` } });
      if (!res.ok) throw new Error(`OANDA ${res.status}`);
      const data = await res.json();
      if (!data.candles || !data.candles.length) throw new Error('No data from OANDA');
      return data.candles.map(c => ({
        time: Math.floor(new Date(c.time).getTime() / 1000),
        open: parseFloat(c.mid.o), high: parseFloat(c.mid.h),
        low:  parseFloat(c.mid.l), close: parseFloat(c.mid.c),
        volume: c.volume || 0,
      }));
    } else {
      const key = getFinnhubKey();
      const fhSymbol = toFinnhubSymbol(symbol, type);
      const resolution = FINNHUB_RES_MAP[interval] || '60';
      const to = Math.floor(Date.now() / 1000);
      const secondsPerCandle = { '15m': 900, '30m': 1800, '1h': 3600, '4h': 14400, '1d': 86400 }[interval] || 3600;
      const from = to - secondsPerCandle * limit;
      const url = `https://finnhub.io/api/v1/stock/candle?symbol=${encodeURIComponent(fhSymbol)}&resolution=${resolution}&from=${from}&to=${to}&token=${key}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.s !== 'ok') throw new Error('No stock data from Finnhub');
      const out = [];
      for (let i = 0; i < data.t.length; i++) {
        out.push({ time: data.t[i], open: data.o[i], high: data.h[i], low: data.l[i], close: data.c[i], volume: data.v[i] || 0 });
      }
      return out;
    }
  }

  function updatePriceLabel(candles) {
    const last = candles[candles.length - 1];
    const prev = candles[candles.length - 2] || last;
    const up = last.close >= prev.close;
    priceLabel.textContent = last.close.toLocaleString(undefined, { maximumFractionDigits: 6 });
    priceLabel.className = 'price ' + (up ? 'up' : 'down');
    renderOhlc(last, up);
  }

  function renderOhlc(c, up) {
    const cls = up ? 'up' : 'down';
    ohlcInfo.innerHTML =
      `<span>O <span class="val">${c.open.toFixed(4)}</span></span>` +
      `<span>H <span class="val">${c.high.toFixed(4)}</span></span>` +
      `<span>L <span class="val">${c.low.toFixed(4)}</span></span>` +
      `<span>C <span class="val ${cls}">${c.close.toFixed(4)}</span></span>` +
      `<span>Vol <span class="val">${formatVolume(c.volume || 0)}</span></span>`;
  }

  let currentCandles = [];

  async function loadChart(symbol, interval, type) {
    statusEl.textContent = 'Loading...';
    symLabel.textContent = symbol;
    try {
      const candles = await fetchCandles(symbol, interval, type);
      currentCandles = candles;
      candleSeries.setData([]);
      volumeSeries.setData([]);
      candleSeries.setData(candles);
      volumeSeries.setData(candles.map(c => ({ time: c.time, value: c.volume, color: volColor(c) })));
      updatePriceLabel(candles);
      chart.priceScale('right').applyOptions({ autoScale: true });
      chart.timeScale().fitContent();
      setTimeout(() => chart.priceScale('right').applyOptions({ autoScale: false }), 100);
      statusEl.textContent = `${symbol} · ${interval} · live`;
    } catch (err) {
      currentCandles = [];
      candleSeries.setData([]);
      volumeSeries.setData([]);
      statusEl.textContent = `${symbol} — ${err.message}`;
      console.error('[loadChart]', symbol, err);
    }
  }

  async function pollLatestCandle() {
    try {
      const candles = await fetchCandles(currentSymbol, currentTf, currentType, 2);
      const latest = candles[candles.length - 1];
      candleSeries.update(latest);
      volumeSeries.update({ time: latest.time, value: latest.volume, color: volColor(latest) });
      updatePriceLabel(candles);
      // Keep currentCandles fresh for magnet
      if (currentCandles.length) {
        if (currentCandles[currentCandles.length - 1].time === latest.time) {
          currentCandles[currentCandles.length - 1] = latest;
        } else {
          currentCandles.push(latest);
        }
      }
    } catch (err) {}
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(pollLatestCandle, currentType === 'crypto' ? 5000 : 15000);
  }

  const CANDLE_DURATION_MS = { '15m': 900000, '30m': 1800000, '1h': 3600000, '4h': 14400000, '1d': 86400000 };
  const candleCountdownEl = document.getElementById('candleCountdown');
  function updateCandleCountdown() {
    const ms = CANDLE_DURATION_MS[currentTf];
    if (!ms) { candleCountdownEl.textContent = ''; return; }
    let rem = Math.ceil((ms - (Date.now() % ms)) / 1000);
    const h = Math.floor(rem / 3600); rem -= h * 3600;
    const m = Math.floor(rem / 60);   rem -= m * 60;
    const s = rem;
    const pad = n => String(n).padStart(2, '0');
    candleCountdownEl.textContent = h > 0
      ? `candle closes in ${h}:${pad(m)}:${pad(s)}`
      : `candle closes in ${pad(m)}:${pad(s)}`;
  }
  updateCandleCountdown();
  setInterval(updateCandleCountdown, 1000);

  chart.subscribeCrosshairMove(param => {
    if (!param.time) return;
    const candleData = param.seriesData.get(candleSeries);
    const volData = param.seriesData.get(volumeSeries);
    if (!candleData) return;
    renderOhlc({ ...candleData, volume: volData ? volData.value : 0 }, candleData.close >= candleData.open);
  });

  /* ============================================================
     WATCHLIST
     ============================================================ */
  const leftPanel = document.getElementById('leftPanel');
  const leftToggle = document.getElementById('leftToggle');
  const watchlistInner = document.getElementById('watchlistInner');
  const groupTabsEls = document.querySelectorAll('.groupTab');
  const addPairBtn = document.getElementById('addPairBtn');

  leftToggle.addEventListener('click', () => {
    leftPanel.classList.toggle('open');
    const open = leftPanel.classList.contains('open');
    priceInfo.style.left = open ? '296px' : '16px';
    statusEl.style.left = open ? '296px' : '16px';
  });

  groupTabsEls.forEach(tab => {
    tab.addEventListener('click', () => {
      groupTabsEls.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentGroup = tab.dataset.group;
      buildWatchlistRows();
      refreshWatchlistPrices();
    });
  });

  function iconUrl(ticker) { return `https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons@master/32/color/${ticker}.png`; }
  function logoUrl(domain) { return `https://www.google.com/s2/favicons?sz=32&domain=${domain}`; }
  function cssId(symbol) { return symbol.replace(/[^a-zA-Z0-9]/g, ''); }

  function watchRowVisual(item) {
    if (item.type === 'crypto') return `<img class="logo" src="${iconUrl(item.icon)}" alt="" onerror="this.style.display='none'" />`;
    if (item.type === 'stock') {
      const domain = STOCK_DOMAINS[item.symbol];
      return domain ? `<img class="logo" src="${logoUrl(domain)}" alt="" onerror="this.style.display='none'" />` : '';
    }
    if (item.type === 'forex') return `<span class="flagEmoji">${FOREX_FLAGS[item.symbol] || '🏳️'}</span>`;
    return '';
  }

  function buildWatchlistRows() {
    const items = groups[currentGroup] || [];
    watchlistInner.innerHTML = items.map(item => `
      <div class="watchRow${item.symbol === currentSymbol ? ' active' : ''}" data-symbol="${item.symbol}" data-type="${item.type}">
        <span class="left">
          <span class="tradeDot" id="dot-${cssId(item.symbol)}" title="No open trade"></span>
          ${watchRowVisual(item)}
          <span class="sym">${item.label}</span>
        </span>
        <span class="right">
          <span class="priceBlock">
            <div class="px" id="px-${cssId(item.symbol)}">--</div>
            <div class="chg" id="chg-${cssId(item.symbol)}">--</div>
          </span>
          <button class="removeBtn" data-remove="${item.symbol}" title="Remove">×</button>
        </span>
      </div>
    `).join('');

    watchlistInner.querySelectorAll('.watchRow').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.classList.contains('removeBtn')) return;
        currentSymbol = row.dataset.symbol;
        currentType = row.dataset.type;
        drawings = loadDrawings(currentSymbol);
        updateObjTree();
        _syncDrawings(currentSymbol);
        _subscribeDrawings(currentSymbol);
        watchlistInner.querySelectorAll('.watchRow').forEach(r => r.classList.remove('active'));
        row.classList.add('active');
        clearChevTools();
        loadChart(currentSymbol, currentTf, currentType).then(startPolling);
      });
    });
    watchlistInner.querySelectorAll('.removeBtn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        groups[currentGroup] = groups[currentGroup].filter(p => p.symbol !== btn.dataset.remove);
        saveGroups();
        buildWatchlistRows();
      });
    });
  }

  async function refreshWatchlistPrices() {
    const items = groups[currentGroup] || [];
    const cryptoItems = items.filter(i => i.type === 'crypto');
    const otherItems = items.filter(i => i.type !== 'crypto');

    if (cryptoItems.length) {
      try {
        const symbolsParam = encodeURIComponent(JSON.stringify(cryptoItems.map(i => i.symbol)));
        const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${symbolsParam}`);
        if (res.ok) {
          const data = await res.json();
          data.forEach(t => applyWatchPrice(t.symbol, parseFloat(t.lastPrice), parseFloat(t.priceChangePercent)));
        }
      } catch (e) {}
    }

    const stockItems = items.filter(i => i.type === 'stock');
    for (const item of stockItems) {
      try {
        const key = getFinnhubKey();
        const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(item.symbol)}&token=${key}`);
        const data = await res.json();
        if (data.c) {
          const changePct = data.pc ? ((data.c - data.pc) / data.pc) * 100 : 0;
          applyWatchPrice(item.symbol, data.c, changePct);
        }
      } catch (e) {}
    }
  }

  // Forex prices: FreeForexAPI (free, no key, real-time) → Dexter /api/prices fallback
  const _forexSessionOpen = {};
  async function refreshForexPrices() {
    const forexItems = groups.forex || [];
    if (!forexItems.length) return;
    const pairParam = forexItems.map(i => i.symbol.replace('/', '')).join(',');

    // Primary: FreeForexAPI — one batch call for all forex pairs
    try {
      const res = await fetch(`https://www.freeforexapi.com/api/live?pairs=${pairParam}`);
      const data = await res.json();
      if (data.code === 200 && data.rates) {
        forexItems.forEach(item => {
          const key = item.symbol.replace('/', '');
          const r = data.rates[key];
          if (!r || !r.rate) return;
          const price = r.rate;
          if (!_forexSessionOpen[item.symbol]) _forexSessionOpen[item.symbol] = price;
          const changePct = ((price - _forexSessionOpen[item.symbol]) / _forexSessionOpen[item.symbol]) * 100;
          applyWatchPrice(item.symbol, price, changePct);
        });
        return;
      }
    } catch (e) {}

    // Fallback: Dexter's /api/prices (cached every 3s via yfinance)
    try {
      const res = await _apiFetch('/api/prices');
      const data = await res.json();
      forexItems.forEach(item => {
        const price = data[item.symbol];
        if (!price) return;
        if (!_forexSessionOpen[item.symbol]) _forexSessionOpen[item.symbol] = price;
        const changePct = ((price - _forexSessionOpen[item.symbol]) / _forexSessionOpen[item.symbol]) * 100;
        applyWatchPrice(item.symbol, price, changePct);
      });
    } catch (e) {}
  }

  function applyWatchPrice(symbol, price, changePct) {
    const pxEl = document.getElementById(`px-${cssId(symbol)}`);
    const chgEl = document.getElementById(`chg-${cssId(symbol)}`);
    if (!pxEl || !chgEl) return;
    const decimals = symbol.includes('/') ? 5 : 4;
    pxEl.textContent = price.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    chgEl.textContent = (changePct >= 0 ? '+' : '') + changePct.toFixed(2) + '%';
    chgEl.className = 'chg ' + (changePct >= 0 ? 'up' : 'down');
  }

  addPairBtn.addEventListener('click', () => {
    const input = prompt(
      `Add a pair to ${currentGroup.toUpperCase()}.\n\n` +
      (currentGroup === 'crypto' ? 'Binance symbol, e.g. DOGEUSDT' : currentGroup === 'forex' ? 'Pair, e.g. USD/CAD' : 'Stock ticker, e.g. AAPL')
    );
    if (!input) return;
    const symbol = input.trim().toUpperCase();
    if (groups[currentGroup].some(p => p.symbol === symbol)) { alert('Already in this list.'); return; }
    groups[currentGroup].push({
      symbol, label: symbol,
      icon: currentGroup === 'crypto' ? symbol.replace('USDT', '').toLowerCase() : undefined,
      type: currentGroup === 'crypto' ? 'crypto' : currentGroup === 'forex' ? 'forex' : 'stock',
    });
    saveGroups();
    buildWatchlistRows();
    refreshWatchlistPrices();
  });

  buildWatchlistRows();
  // Resolve backend URL first (no-op on localhost, reads Firebase config on GitHub Pages),
  // then kick off all API-dependent polling.
  _resolveApiBase().then(() => {
    refreshWatchlistPrices();  refreshForexPrices();
    setInterval(refreshWatchlistPrices, 3000);
    setInterval(refreshForexPrices, 1000);
    refreshTradingLogs();
    setInterval(refreshTradingLogs, 5000);
    refreshChevsCorner();
    setInterval(refreshChevsCorner, 30000);
    refreshJaneTrades();
    setInterval(refreshJaneTrades, 10000);
  });

  /* ============================================================
     TRADING LOGS
     ============================================================ */
  const tradingLogsEl = document.getElementById('tradingLogs');
  let lastTradeStatuses = {};

  function pnlClass(pnl) { return pnl >= 0 ? 'pnl-up' : 'pnl-down'; }
  function fmtPnl(pnl) { return (pnl >= 0 ? '+$' : '-$') + Math.abs(pnl).toFixed(2); }

  const _sidebarCollapsed = {};
  function toggleSidebar(id) {
    _sidebarCollapsed[id] = !_sidebarCollapsed[id];
    const group = document.getElementById(id + 'Group');
    const arrow = document.getElementById(id + 'Arrow');
    if (group) group.style.display = _sidebarCollapsed[id] ? 'none' : '';
    if (arrow) arrow.textContent = _sidebarCollapsed[id] ? '▶' : '▼';
  }
  function moodEmoji(pnl) {
    if (pnl >= 20) return '🥳';
    if (pnl >= 5) return '😄';
    if (pnl > 0) return '🙂';
    if (pnl > -5) return '😐';
    if (pnl > -20) return '😟';
    return '😡';
  }

  let activeLogTrade = null;
  let confPriceLines = [];

  function clearConfLines() {
    confPriceLines.forEach(l => { try { candleSeries.removePriceLine(l); } catch(e){} });
    confPriceLines = [];
  }

  function drawConfLines(confPrices) {
    clearConfLines();
    if (!confPrices || !Object.keys(confPrices).length) return;
    const CONF_COLORS = {
      SR_S: '#089981', SR_R: '#f23645',
      FB_50: '#9b59b6', FB_618: '#d4af37', FB_65: '#d4af37', FB_786: '#e67e22',
    };
    Object.entries(confPrices).forEach(([key, price]) => {
      if (!price) return;
      const color = CONF_COLORS[key] || '#787b86';
      const line = candleSeries.createPriceLine({
        price: parseFloat(price), color, lineWidth: 1,
        lineStyle: 2, axisLabelVisible: true, title: key.replace('_', ' '),
      });
      confPriceLines.push(line);
    });
  }

  function renderTradingLogs(data) {
    const active = (data.trades || data.active || []).filter(t => t.status === 'OPEN' || t.status === 'PENDING');
    const closedList = (data.closed || []).slice().reverse().slice(0, 3);
    let html = '';
    if (!active.length) {
      html += '<div class="emptyNote">No active trades right now.</div>';
    } else {
      active.forEach(t => {
        const sym = t.symbol || t.pair || '';
        const justClosed = lastTradeStatuses[t.row] && lastTradeStatuses[t.row] !== t.status;
        const confData = encodeURIComponent(JSON.stringify(t.confluence_prices || {}));
        const assetType = sym.endsWith('USDT') ? 'crypto' : (sym.includes('/') ? 'forex' : 'stock');
        html += `
          <div class="logRow${justClosed ? ' pulse' : ''}" data-pair="${sym}" data-type="${assetType}" data-conf="${confData}" data-row="${t.row||''}" data-entry="${t.entry||''}" data-sl="${t.sl||''}" data-tp="${t.tp||''}" data-direction="${t.direction||''}" data-ts="${t.open_ts||''}" data-tags="${t.tags||''}">
            <span class="logMood">${moodEmoji(t.live_pnl)}</span>
            <span class="logPair">${sym}</span>
            <span class="logType">${t.trade_type || 'day'}</span>
            <span class="logLev">${t.leverage}x</span>
            <span class="logPnl ${pnlClass(t.live_pnl)}">${fmtPnl(t.live_pnl)}</span>
          </div>`;
        lastTradeStatuses[t.row] = t.status;
      });
    }
    closedList.forEach(c => {
      const sym = c.symbol || c.pair || '';
      const pnl = c.pnl != null ? c.pnl : (c.result != null ? c.result : 0);
      const outcome = (c.outcome || '').toUpperCase();
      const resultEmoji = outcome === 'WIN' ? '😉' : '😞';
      const dirEmoji = (c.direction || '').toUpperCase() === 'LONG' ? '⬆️' : '⬇️';
      const assetType = sym.endsWith('USDT') ? 'crypto' : (sym.includes('/') ? 'forex' : 'stock');
      const openTs = c.open_ts || c.ts || '';
      html += `
        <div class="logRow lastClosedRow" data-pair="${sym}" data-type="${assetType}" data-conf="{}" data-row="" data-entry="${c.entry||''}" data-sl="${c.sl||''}" data-tp="${c.tp||''}" data-direction="${c.direction||''}" data-ts="${openTs}" data-tags="${c.tags||''}">
          <span class="logDir">${dirEmoji}</span>
          <span class="logPair">${sym}</span>
          <span class="logType">${c.trade_type || ''}</span>
          <span class="logLev">closed</span>
          <span class="logPnl ${pnlClass(pnl)}">${resultEmoji} ${fmtPnl(pnl)}</span>
        </div>`;
    });
    tradingLogsEl.innerHTML = html;

    tradingLogsEl.querySelectorAll('.logRow[data-pair]').forEach(row => {
      row.addEventListener('click', async () => {
        const pair = row.dataset.pair;
        const type = row.dataset.type;
        const rowId = row.dataset.row;
        const conf = JSON.parse(decodeURIComponent(row.dataset.conf || '{}'));
        tradingLogsEl.querySelectorAll('.logRow').forEach(r => r.style.borderLeft = '');
        row.style.borderLeft = '2px solid #2962ff';
        activeLogTrade = rowId;
        const tradeSnap = {
          entry: parseFloat(row.dataset.entry) || null,
          sl:    parseFloat(row.dataset.sl)    || null,
          tp:    parseFloat(row.dataset.tp)    || null,
          direction: row.dataset.direction,
          open_ts: row.dataset.ts,
          tags: row.dataset.tags,
        };
        currentSymbol = pair; currentType = type;
        drawings = loadDrawings(currentSymbol); updateObjTree();
        _syncDrawings(currentSymbol); _subscribeDrawings(currentSymbol);
        watchlistInner.querySelectorAll('.watchRow').forEach(r => r.classList.remove('active'));
        clearChevTools();
        await loadChart(currentSymbol, currentTf, currentType);
        startPolling();
        activateTradeOverlay(tradeSnap, conf);
      });
    });
  }

  async function refreshTradingLogs() {
    try {
      const res = await fetch(`${FIREBASE_BASE}/monitor.json?_t=${Date.now()}`);
      if (!res.ok) throw new Error('firebase error');
      const data = await res.json();
      if (data) renderTradingLogs(data);

  document.getElementById('resetBalance').addEventListener('click', async () => {
    if (!confirm('Reset Dexter\'s balance to $10,000 and clear all open/pending trades?')) return;
    try {
      const res = await _apiFetch('/api/reset_balance', { method: 'POST' });

  /* ============================================================
     CHEV'S CORNER - clickable idea cards, no embedded mini charts.
     Clicking an idea loads its pair into the MAIN chart and draws
     Chev's entry/SL/TP lines there, toggleable via "Chev Tools".

  const chevIdeasEl = document.getElementById('chevIdeas');

  function clearChevTools() {
    chevPriceLines.forEach(line => candleSeries.removePriceLine(line));
    chevPriceLines = [];
    chevBanner.style.display = 'none';
    activeIdeaRow = null;
    document.querySelectorAll('.ideaCard').forEach(c => c.classList.remove('activeIdea'));

    // Hide trade overlay bar and reset state

    _overlayComponents = { sr: true, fib: true };
    overlayDrawings = [];
    document.getElementById('btnOverlayEntry').classList.remove('active');
    document.getElementById('btnOverlayAnalysis').classList.remove('active');
    document.getElementById('btnOverlayAnalysisArrow').classList.remove('active');
    document.getElementById('overlayAnalysisPanel').style.display = 'none';
    document.getElementById('ovChkSR').checked  = true;
    document.getElementById('ovChkFib').checked = true;
  }

  // Trade overlay state
  let _overlayEntry       = false;
  let _overlayPanelOpen   = false;
  let _overlayAnalysisOn  = true;
  let _overlayComponents  = { sr: true, fib: true };
  let _activeTrade        = null;  // { entry, sl, direction, open_ts, conf }

  document.getElementById('btnOverlayEntry').addEventListener('click', () => {
    _overlayEntry = !_overlayEntry;
    document.getElementById('btnOverlayEntry').classList.toggle('active', _overlayEntry);
    _refreshTradeOverlayLines();
  });
  document.getElementById('btnOverlayAnalysis').addEventListener('click', (e) => {
    e.stopPropagation();
    _overlayAnalysisOn = !_overlayAnalysisOn;
    document.getElementById('btnOverlayAnalysis').classList.toggle('active', _overlayAnalysisOn);
    _refreshTradeOverlayLines();
  });
  document.getElementById('btnOverlayAnalysisArrow').addEventListener('click', (e) => {
    e.stopPropagation();
    _overlayPanelOpen = !_overlayPanelOpen;
    document.getElementById('btnOverlayAnalysisArrow').classList.toggle('active', _overlayPanelOpen);
    document.getElementById('overlayAnalysisPanel').style.display = _overlayPanelOpen ? 'flex' : 'none';
  });
  document.getElementById('ovChkSR').addEventListener('change', e => {
    _overlayComponents.sr = e.target.checked;
    _refreshTradeOverlayLines();
  });
  document.getElementById('ovChkFib').addEventListener('change', e => {
    _overlayComponents.fib = e.target.checked;
    _refreshTradeOverlayLines();
  });
  document.addEventListener('click', e => {
    const panel = document.getElementById('overlayAnalysisPanel');
    const arrow = document.getElementById('btnOverlayAnalysisArrow');
    if (_overlayPanelOpen && panel && !panel.contains(e.target) && e.target !== arrow) {
      _overlayPanelOpen = false;
      arrow.classList.remove('active');
      panel.style.display = 'none';
    }
  });

  function _refreshTradeOverlayLines() {
    clearConfLines();
    overlayDrawings = [];
    if (!_activeTrade) { redrawAll(); return; }

    // Entry / SL / TP price lines
    if (_overlayEntry) {
      const { entry, sl, tp } = _activeTrade;
      // Entry — solid gold line, axis label visible
      if (entry != null) try { confPriceLines.push(candleSeries.createPriceLine({ price: entry, color: 'rgba(212,175,55,0.6)', lineWidth: 1, lineStyle: 0, axisLabelVisible: true, title: 'Entry' })); } catch(e){}
      // SL / TP — dashed, 50% opacity, no axis label (canvas draws small text)
      if (sl != null) try { confPriceLines.push(candleSeries.createPriceLine({ price: sl, color: 'rgba(242,54,69,0.5)', lineWidth: 1, lineStyle: 2, axisLabelVisible: false, title: '' })); } catch(e){}
      if (tp != null) try { confPriceLines.push(candleSeries.createPriceLine({ price: tp, color: 'rgba(8,153,129,0.5)', lineWidth: 1, lineStyle: 2, axisLabelVisible: false, title: '' })); } catch(e){}
    }

    if (!_overlayAnalysisOn) { redrawAll(); return; }

    const cp = _activeTrade.conf || {};

    // S/R levels — clean price lines, no fib clutter
    if (_overlayComponents.sr) {
      if (cp.SR_S) { try { confPriceLines.push(candleSeries.createPriceLine({ price: parseFloat(cp.SR_S), color: '#089981', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'Support' })); } catch(e){} }
      if (cp.SR_R) { try { confPriceLines.push(candleSeries.createPriceLine({ price: parseFloat(cp.SR_R), color: '#f23645', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'Resist'  })); } catch(e){} }
    }

    // Fibonacci — canvas fib tool, no price axis labels
    if (_overlayComponents.fib && cp.FB_618 != null && cp.FB_50 != null && currentCandles && currentCandles.length >= 2) {
      const fb50  = parseFloat(cp.FB_50);
      const fb618 = parseFloat(cp.FB_618);
      const range = (fb50 - fb618) / (0.618 - 0.5);
      const pLow  = Math.min(fb50 + range * 0.5, fb50 - range * 0.5);
      const pHigh = Math.max(fb50 + range * 0.5, fb50 - range * 0.5);

      // Find candles closest to the actual swing low and swing high
      let tLow  = currentCandles[0], tHigh = currentCandles[currentCandles.length - 1];
      let dLow  = Infinity, dHigh = Infinity;
      for (const c of currentCandles) {
        const dl = Math.abs(c.low  - pLow);
        const dh = Math.abs(c.high - pHigh);
        if (dl < dLow)  { dLow  = dl; tLow  = c; }
        if (dh < dHigh) { dHigh = dh; tHigh = c; }
      }
      overlayDrawings = [{
        type: 'fib',
        time1: tLow.time,  price1: pLow,
        time2: tHigh.time, price2: pHigh,
        color: '#d4af37', lineWidth: 1.5, visible: true,
      }];
    }

    redrawAll();
  }

  function activateTradeOverlay(trade, conf) {
    _activeTrade = { ...trade, conf };
    _overlayEntry = true; _overlayPanelOpen = false; _overlayAnalysisOn = true;
    _overlayComponents = { sr: true, fib: true };
    document.getElementById('tradeOverlayBar').style.display = 'flex';
    document.getElementById('btnOverlayEntry').classList.add('active');
    document.getElementById('btnOverlayAnalysis').classList.add('active');
    document.getElementById('btnOverlayAnalysisArrow').classList.remove('active');
    document.getElementById('overlayAnalysisPanel').style.display = 'none';
    document.getElementById('ovChkSR').checked  = true;
    document.getElementById('ovChkFib').checked = true;
    _refreshTradeOverlayLines();
  }

  function drawChevToolsForIdea(idea) {
    chevPriceLines.forEach(line => candleSeries.removePriceLine(line));
    chevPriceLines = [];
    if (!chevToolsOn) return;
    const lines = [
      { price: parseFloat(idea.entry), color: '#9598a1', title: 'Entry' },
      { price: parseFloat(idea.sl), color: '#f23645', title: 'SL' },
      { price: parseFloat(idea.tp), color: '#089981', title: 'TP' },
    ];
    lines.forEach(l => {
      chevPriceLines.push(candleSeries.createPriceLine({ price: l.price, color: l.color, lineWidth: 2, lineStyle: 0, axisLabelVisible: true, title: l.title }));
    });
    const tagList = (idea.tags || '').split(',').filter(Boolean).map(t => TAG_NAMES[t.trim().toUpperCase()] || t).join(' · ');
    chevBanner.innerHTML = `<strong>${idea.pair} ${idea.direction}</strong><br>${tagList || 'No tags logged'}`;
    chevBanner.style.display = 'block';
  }

  async function selectIdea(idea) {
    activeIdeaRow = idea.row;
    document.querySelectorAll('.ideaCard').forEach(c => c.classList.toggle('activeIdea', c.dataset.row === String(idea.row)));
    const type = idea.pair.endsWith('USDT') ? 'crypto' : (idea.pair.includes('/') ? 'forex' : 'stock');
    currentSymbol = idea.pair;
    currentType = type;
    drawings = loadDrawings(currentSymbol);
    updateObjTree();
    _syncDrawings(currentSymbol); _subscribeDrawings(currentSymbol);
    watchlistInner.querySelectorAll('.watchRow').forEach(r => r.classList.remove('active'));
    clearChevTools();
    await loadChart(currentSymbol, currentTf, currentType);
    startPolling();
    drawChevToolsForIdea(idea);
  }

  function renderChevIdeas() {
    if (!currentIdeas.length) {
      chevIdeasEl.innerHTML = '<div class="emptyNote">No pending ideas right now.</div>';
      return;
    }
    chevIdeasEl.innerHTML = currentIdeas.map(idea => {
      const tagList = (idea.tags || '').split(',').filter(Boolean).map(t => TAG_NAMES[t.trim().toUpperCase()] || t).join(' · ');
      return `
        <div class="ideaCard${idea.row === activeIdeaRow ? ' activeIdea' : ''}" data-row="${idea.row}">
          <div class="ideaHeader"><span class="ideaPair">${idea.pair} ${idea.direction}</span><span class="ideaType">${idea.trade_type || ''}</span></div>
          <div class="ideaTags">${tagList || 'No confluence tags logged'}</div>
          <div class="ideaMeta"><span class="e">E ${idea.entry}</span><span class="s">SL ${idea.sl}</span><span class="t">TP ${idea.tp}</span></div>
        </div>`;
    }).join('');
    chevIdeasEl.querySelectorAll('.ideaCard').forEach(card => {
      card.addEventListener('click', () => {
        const idea = currentIdeas.find(i => String(i.row) === card.dataset.row);
        if (idea) selectIdea(idea);
      });
    });
  }

  async function refreshChevsCorner() {
    try {
      const res = await _apiFetch('/api/pending');
      if (!res.ok) throw new Error('no response');
      currentIdeas = await res.json();
      renderChevIdeas();
    } catch (e) {
      chevIdeasEl.innerHTML = '<div class="emptyNote">Can\'t reach Dexter for pending ideas.</div>';
    }

  /* ============================================================
     JANE'S TRADES
     ============================================================ */
  function renderJaneTrades(data) {
    const active     = (data.active || []).slice(0, 8);
    const lastClosed = data.last_closed;
    const balance    = data.balance;

    if (balance != null) {
      const lbl = document.getElementById('janeBalanceLabel');

  function dv(d, k, def) { return d[k] !== undefined ? d[k] : def; }

  /* ---- Canvas sizing ---- */
  function syncCanvasSize() {
    const dpr = window.devicePixelRatio || 1;
    const w = chartWrap.clientWidth;
    const h = chartWrap.clientHeight;
    drawCanvas.width  = Math.round(w * dpr);
