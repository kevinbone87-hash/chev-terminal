name: Sync monitor.html → chev-monitor

on:
  push:
    branches: [main]
    paths:
      - monitor.html
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout chev-terminal
        uses: actions/checkout@v4

      - name: Push monitor.html as index.html via GitHub API
        env:
          GH_TOKEN: ${{ secrets.CHEV_MONITOR_TOKEN }}
        run: |
          set -e

          # Base64-encode the file
          CONTENT=$(base64 -w 0 monitor.html)

          # Get current SHA of index.html in target repo
          RESPONSE=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/chevcheliosllm/chev-monitor/contents/index.html")

          echo "API response: $RESPONSE"

          SHA=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            print(d.get('sha', ''))
          except:
            print('')
          ")

          echo "Current SHA: $SHA"

          # Build JSON payload
          if [ -n "$SHA" ]; then
            PAYLOAD=$(python3 -c "
          import json, sys
          print(json.dumps({
            'message': 'Sync monitor.html → index.html from chev-terminal [bot]',
            'content': sys.argv[1],
            'sha': sys.argv[2]
          }))" "$CONTENT" "$SHA")
          else
            PAYLOAD=$(python3 -c "
          import json, sys
          print(json.dumps({
            'message': 'Sync monitor.html → index.html from chev-terminal [bot]',
            'content': sys.argv[1]
          }))" "$CONTENT")
          fi

          # Push as index.html
          RESULT=$(curl -s -X PUT \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/chevcheliosllm/chev-monitor/contents/index.html")

          echo "PUT result: $RESULT"

          # Fail if GitHub returned an error
          echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if 'message' in d and 'content' not in d:
            print('ERROR:', d['message'])
            sys.exit(1)
          else:
            print('Success — monitor.html synced as index.html.')
          "
